{% extends "layout.html" %}
{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 2rem auto; padding: 2rem;">
    <h2 class="mb-4">Apply for Leave</h2>
    <p class="mb-4" style="color: var(--text-secondary);">Leave applications will deduct directly from your working days during the current payroll generation if approved.</p>
    
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Start Date</label>
            <input type="date" name="start_date" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">End Date</label>
            <input type="date" name="end_date" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Reason</label>
            <textarea name="reason" class="form-control" rows="3" required placeholder="Medical, vacation, etc."></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Application</button>
    </form>
</div>
{% endblock %}
