{% extends "layout.html" %}
{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 2rem auto; padding: 2rem;">
    <h2 class="mb-4">Register New Employee</h2>
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Department</label>
            <input type="text" name="department" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Designation</label>
            <input type="text" name="designation" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Register Employee</button>
        <a href="{{ url_for('hr.dashboard') }}" class="btn" style="color: var(--text-secondary);">Cancel</a>
    </form>
</div>
{% endblock %}
