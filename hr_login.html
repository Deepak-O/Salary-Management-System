{% extends "layout.html" %}
{% block content %}
<div class="glass-panel" style="max-width: 450px; margin: 4rem auto; padding: 2.5rem;">
    <div class="text-center mb-4">
        <h2 style="color: var(--accent);">HR Login</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">Sign in to access management tools</p>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Admin Email</label>
            <input type="email" name="email" class="form-control" required placeholder="hr@example.com">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Authenticate</button>
    </form>
    
    <div class="text-center mt-4">
        <a href="{{ url_for('auth.home') }}" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Back to Hub</a>
    </div>
</div>
{% endblock %}
