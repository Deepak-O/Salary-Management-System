{% extends "layout.html" %}
{% block content %}
<div class="glass-panel" style="max-width: 450px; margin: 4rem auto; padding: 2.5rem;">
    <div class="text-center mb-4">
        <h2 style="color: #34d399;">Employee Login</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">View your payslips and salary structure</p>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" required placeholder="name@company.com">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 1rem;">Access My Portal</button>
    </form>
    
    <div class="text-center" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--surface-border);">
        <p style="color: var(--text-secondary); margin-bottom: 1rem;">Don't have an account yet?</p>
        <a href="{{ url_for('auth.register') }}" class="btn" style="border: 1px solid #34d399; color: #34d399; width: 100%;">Register Account</a>
    </div>

    <div class="text-center mt-4">
        <a href="{{ url_for('auth.home') }}" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Back to Hub</a>
    </div>
</div>
{% endblock %}
