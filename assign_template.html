{% extends "layout.html" %}
{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 2rem auto; padding: 2rem;">
    <h2 class="mb-4">Assign Template to {{ employee.name }}</h2>
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Select Salary Template</label>
            <select name="template_id" class="form-control" required>
                <option value="" disabled selected>-- Select a template --</option>
                {% for t in templates %}
                    <option value="{{ t._id }}" {% if employee.salary_template_id == t._id|string %}selected{% endif %}>
                        {{ t.name }} (Net: ₹{{ "%.2f"|format(t.basic_pay + t.allowances - t.deductions) }})
                    </option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Assign Template</button>
        <a href="{{ url_for('hr.dashboard') }}" class="btn" style="color: var(--text-secondary);">Cancel</a>
    </form>
</div>
{% endblock %}
